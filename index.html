<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人导航页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .search-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .search-box {
            display: flex;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            outline: none;
            font-size: 16px;
            background: white;
        }
        
        .search-button {
            padding: 15px 25px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        .search-button:hover {
            background: #0056b3;
        }
        
        .categories {
            padding: 30px;
        }
        
        .category-title {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #007bff;
        }
        
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .link-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 1px solid #e9ecef;
            display: block;
        }
        
        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border-color: #007bff;
        }
        
        .link-icon {
            width: 40px;
            height: 40px;
            background: #007bff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            color: white;
            font-size: 18px;
        }
        
        .link-name {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        
        .link-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            background: #2c3e50;
            color: white;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .links-grid {
                grid-template-columns: 1fr;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-input, .search-button {
                width: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 我的导航页 🌟</h1>
            <p>常用网站快速访问</p>
        </div>
        
        <div class="search-section">
            <form class="search-box" onsubmit="searchWebsite(event)">
                <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索网站...">
                <button type="submit" class="search-button">🔍 搜索</button>
            </form>
        </div>
        
        <div class="categories">
            <h2 class="category-title">📚 学习资源</h2>
            <div class="links-grid">
                <a href="https://www.baidu.com" target="_blank" class="link-card">
                    <div class="link-icon">📖</div>
                    <span class="link-name">百度</span>
                    <span class="link-desc">中文搜索引擎</span>
                </a>
                <a href="https://www.google.com" target="_blank" class="link-card">
                    <div class="link-icon">🔍</div>
                    <span class="link-name">Google</span>
                    <span class="link-desc">全球搜索引擎</span>
                </a>
                <a href="https://www.zhihu.com" target="_blank" class="link-card">
                    <div class="link-icon">💬</div>
                    <span class="link-name">知乎</span>
                    <span class="link-desc">知识问答社区</span>
                </a>
                <a href="https://www.csdn.net" target="_blank" class="link-card">
                    <div class="link-icon">💻</div>
                    <span class="link-name">CSDN</span>
                    <span class="link-desc">程序员社区</span>
                </a>
            </div>
            
            <h2 class="category-title">💼 工作工具</h2>
            <div class="links-grid">
                <a href="https://mail.qq.com" target="_blank" class="link-card">
                    <div class="link-icon">📧</div>
                    <span class="link-name">QQ邮箱</span>
                    <span class="link-desc">邮件收发工具</span>
                </a>
                <a href="https://docs.qq.com" target="_blank" class="link-card">
                    <div class="link-icon">📝</div>
                    <span class="link-name">腾讯文档</span>
                    <span class="link-desc">在线文档协作</span>
                </a>
                <a href="https://www.office.com" target="_blank" class="link-card">
                    <div class="link-icon">📊</div>
                    <span class="link-name">Office 365</span>
                    <span class="link-desc">微软办公套件</span>
                </a>
                <a href="https://www.wps.cn" target="_blank" class="link-card">
                    <div class="link-icon">📄</div>
                    <span class="link-name">WPS Office</span>
                    <span class="link-desc">国产办公软件</span>
                </a>
            </div>
            
            <h2 class="category-title">🎮 娱乐休闲</h2>
            <div class="links-grid">
                <a href="https://www.bilibili.com" target="_blank" class="link-card">
                    <div class="link-icon">📺</div>
                    <span class="link-name">B站</span>
                    <span class="link-desc">视频分享网站</span>
                </a>
                <a href="https://music.163.com" target="_blank" class="link-card">
                    <div class="link-icon">🎵</div>
                    <span class="link-name">网易云音乐</span>
                    <span class="link-desc">音乐分享平台</span>
                </a>
                <a href="https://www.douban.com" target="_blank" class="link-card">
                    <div class="link-icon">🎬</div>
                    <span class="link-name">豆瓣</span>
                    <span class="link-desc">电影图书评价</span>
                </a>
                <a href="https://www.taobao.com" target="_blank" class="link-card">
                    <div class="link-icon">🛒</div>
                    <span class="link-name">淘宝网</span>
                    <span class="link-desc">网上购物平台</span>
                </a>
            </div>
        </div>
        
        <div class="footer">
            <p>&copy; 2024 我的导航页 - 让上网更便捷</p>
        </div>
    </div>

    <script>
        function searchWebsite(event) {
            event.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                // 默认使用百度搜索
                window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(query)}`, '_blank');
            }
        }
        
        // 添加键盘事件监听
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchWebsite(e);
            }
        });
        
        // 添加点击链接统计（可选功能）
        const linkCards = document.querySelectorAll('.link-card');
        linkCards.forEach(card => {
            card.addEventListener('click', function(e) {
                // 这里可以添加统计逻辑，比如记录点击次数
                console.log('点击了:', this.querySelector('.link-name').textContent);
            });
        });
    </script>
</body>
</html>
